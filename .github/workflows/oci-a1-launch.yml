name: RadarProp OCI A1 Capacity Hunter

on:
  workflow_dispatch:
  schedule:
    # Cada 10 minutos, evitando el minuto 0 de cada hora.
    - cron: "3-59/10 * * * *"

permissions:
  contents: read
  actions: write

concurrency:
  group: radarprop-oci-a1-launch
  cancel-in-progress: false

jobs:
  try-launch:
    name: Intentar crear VM.Standard.A1.Flex
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
      OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
      OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}

      COMPARTMENT_ID: ${{ secrets.COMPARTMENT_ID }}
      AVAILABILITY_DOMAIN: ${{ secrets.AVAILABILITY_DOMAIN }}
      IMAGE_ID: ${{ secrets.IMAGE_ID }}
      SUBNET_ID: ${{ secrets.SUBNET_ID }}
      SSH_PUBLIC_KEY: ${{ secrets.SSH_PUBLIC_KEY }}

      OCPUS: ${{ vars.OCPUS || '2' }}
      MEMORY_GB: ${{ vars.MEMORY_GB || '12' }}
      DISPLAY_NAME: ${{ vars.DISPLAY_NAME || 'radarprop-prod-01' }}

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v6

      - name: Preparar Python
        uses: actions/setup-python@v6
        with:
            python-version: "3.12"

      - name: Instalar OCI CLI
        run: |
          python -m pip install --upgrade pip
          python -m pip install oci-cli
          oci --version

      - name: Validar secretos y variables
        shell: bash
        run: |
          set -euo pipefail

          required=(
            OCI_CLI_TENANCY
            OCI_CLI_USER
            OCI_CLI_FINGERPRINT
            OCI_CLI_KEY_CONTENT
            OCI_CLI_REGION
            COMPARTMENT_ID
            AVAILABILITY_DOMAIN
            IMAGE_ID
            SUBNET_ID
            SSH_PUBLIC_KEY
            OCPUS
            MEMORY_GB
            DISPLAY_NAME
          )

          for name in "${required[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::La variable o secreto $name está vacío."
              exit 10
            fi
          done

          case "$COMPARTMENT_ID" in
            ocid1.compartment.*) ;;
            *) echo "::error::COMPARTMENT_ID no parece un OCID válido."; exit 11 ;;
          esac

          case "$IMAGE_ID" in
            ocid1.image.*) ;;
            *) echo "::error::IMAGE_ID no parece un OCID válido."; exit 12 ;;
          esac

          case "$SUBNET_ID" in
            ocid1.subnet.*) ;;
            *) echo "::error::SUBNET_ID no parece un OCID válido."; exit 13 ;;
          esac

          printf '%s\n' "$SSH_PUBLIC_KEY" > "$RUNNER_TEMP/radarprop_ssh.pub"
          chmod 600 "$RUNNER_TEMP/radarprop_ssh.pub"

          echo "SSH_KEY_FILE=$RUNNER_TEMP/radarprop_ssh.pub" >> "$GITHUB_ENV"

      - name: Verificar autenticación OCI
        run: |
          set -euo pipefail
          oci iam region-subscription list \
            --tenancy-id "$OCI_CLI_TENANCY" \
            --query 'data[0]."region-name"' \
            --raw-output >/dev/null

      - name: Intentar lanzamiento A1
        id: launch
        shell: bash
        run: |
          chmod +x scripts/oci_try_launch.sh
          scripts/oci_try_launch.sh

      - name: Desactivar scheduler al conseguir la instancia
        if: steps.launch.outputs.instance_ready == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          echo "Instancia lista. Intentando desactivar la programación automática..."

          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            "/repos/${GITHUB_REPOSITORY}/actions/workflows/oci-a1-launch.yml/disable" \
            && echo "Workflow desactivado correctamente." \
            || echo "::warning::No se pudo desactivar el workflow. Los siguientes intentos detectarán la instancia existente y no crearán duplicados."
